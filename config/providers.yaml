# Provider registry — each entry defines a known AI model provider.
# Adding a provider = create YAML entry + optional Python adapter in src/providers/.
# ---
# adapter: Python module path in src/free_ai_model_router/providers/
#   When null, the generic openai_compatible adapter is used if api_style allows.
# discovery_priority: for ordering multi-source model discovery
# enabled: false disables all collection/verification for this provider

providers:
  - provider_id: openrouter
    name: OpenRouter
    website: https://openrouter.ai
    api_base: https://openrouter.ai/api/v1
    api_style: openai_compatible
    adapter: openrouter
    discovery_priority: 10
    enabled: true
    sources:
      models_api: https://openrouter.ai/api/v1/models
      pricing_page: https://openrouter.ai/models
      docs: https://openrouter.ai/docs
      changelog: https://openrouter.ai/changelog

  - provider_id: opencode_zen
    name: OpenCode Zen
    website: https://opencode.cloud
    api_base: https://api.opencode.cloud/zen/v1
    api_style: openai_compatible
    adapter: opencode_zen
    discovery_priority: 20
    enabled: true
    sources:
      docs: https://opencode.cloud/docs
      models_page: https://opencode.cloud/zen/models

  - provider_id: zai
    name: z.ai
    website: https://z.ai
    api_base: https://api.z.ai/api/paas/v4
    api_style: openai_compatible
    adapter: zai
    discovery_priority: 30
    enabled: true
    sources:
      docs: https://z.ai/docs
      status: https://status.z.ai

