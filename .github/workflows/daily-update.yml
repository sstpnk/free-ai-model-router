name: Daily Model Update

on:
  workflow_dispatch:
  schedule:
    # 05:17 UTC daily — avoids top-of-hour scheduler congestion
    - cron: "17 5 * * *"

# Minimal permissions — only contents write for commits
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[litellm]"

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/cache/
          key: ${{ runner.os }}-model-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-model-cache-

      # Consolidated pipeline run — each individual command runs the full pipeline
      # anyway, so run-all with --no-runtime-checks does collect+discover+benchmark+score+generate+report
      - name: Run pipeline (collect, discover, benchmark, score, generate, report)
        run: python -m free_ai_model_router run-all --no-runtime-checks
        env:
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify API access
        run: python -m free_ai_model_router verify
        env:
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit and push
        run: |
          git config user.name "free-ai-model-router[bot]"
          git config user.email "bot@free-ai-model-router.example.com"
          git add -A output/ reports/
          if git diff --cached --quiet; then
            echo "No new changes generated — skipping commit"
          else
            git commit -m "data: daily model update $(date +'%Y-%m-%d')"
            git push
          fi

      - name: GitHub Actions Summary
        run: |
          echo "## Free AI Model Router — Daily Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "- **Config:** \`output/litellm-config-sample.yaml\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Reports:** \`reports/\`" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/models.md ]; then
            echo "- Models in route: \`$(grep -c '| ✓ |' reports/models.md || echo 0)\`" >> $GITHUB_STEP_SUMMARY
          fi
